<!doctype html>
<html lang="en">
  <head>
    <!-- Charset -->
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Theme -->
    <meta name="theme-color" content="#2563eb" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/icon-512.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- SEO -->
    <title>
      NewsHub | Latest Breaking News, World, Technology, Crypto & Market News
    </title>

    <meta
      name="description"
      content="Stay informed with the latest breaking news from around the world. Explore technology, business, cryptocurrency, finance, sports, entertainment, health, science, and market updates with NewsHub."
    />

    <meta
      name="keywords"
      content="latest news, breaking news, world news, india news, technology news, business news, crypto news, market news, finance news, sports news, headlines, NewsHub"
    />

    <meta name="author" content="NewsHub" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://rai-deepak-07.github.io/NewsHub/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NewsHub" />
    <meta
      property="og:title"
      content="NewsHub | Latest Breaking News"
    />
    <meta
      property="og:description"
      content="Read the latest breaking news, world updates, business, technology, cryptocurrency and market news."
    />
    <meta property="og:image" content="https://your-domain.com/og-image.png" />
    <meta property="og:url" content="https://rai-deepak-07.github.io/NewsHub/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NewsHub" />
    <meta
      name="twitter:description"
      content="Latest Breaking News, World, Crypto & Market Updates."
    />
    <meta
      name="twitter:image"
      content="https://your-domain.com/og-image.png"
    />

    <!-- Browser -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="light" />
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this application.
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
